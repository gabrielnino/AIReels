browser_config:
  extra_http_headers:
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8
    Accept-Language: en-US,en;q=0.9,es;q=0.8
  headless: false
  slow_mo: 1000
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36
  viewport:
    height: 1080
    width: 1920
data_collection:
  logs:
  - element_locations
  - selector_matches
  metrics:
  - form_detection_time
  - field_count
  - selector_effectiveness
  screenshots:
  - on_error
  - login_form_visible
  - fields_detected
date: 2026-04-13 22:20
duration_estimate: 15 minutos
experiment_id: exp_002
hypothesis: "Despu\xE9s de navegaci\xF3n exitosa (EXP-001), Instagram muestra formulario\n\
  de login est\xE1ndar con campos accesibles mediante selectores comunes.\n"
notes: "- Basado en \xE9xito de EXP-001 (navegaci\xF3n funciona)\n- Selectores comunes\
  \ de Instagram: input[name=\"username\"], input[name=\"password\"]\n- Si formulario\
  \ no est\xE1 visible, usuario puede ya estar logueado\n- Necesario para proceder\
  \ con EXP-003 (ingreso de credenciales)"
objective: "Verificar que despu\xE9s de navegar a Instagram, el formulario de login\n\
  (campos de usuario y contrase\xF1a) son visibles y accesibles.\n"
test_scenario:
  failure_handling:
    fallback_action: check_alternative_selectors
    max_retries: 1
    retry_delay: 5000
  steps:
  - setup_browser
  - navigate_to_instagram
  - check_login_form_present
  - verify_username_field
  - verify_password_field
  - verify_login_button
  success_criteria:
  - login_form_visible
  - username_field_accessible
  - password_field_accessible
  - login_button_clickable
title: Verificar formulario de login accesible
